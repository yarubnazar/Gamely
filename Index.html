<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Couple Secrets Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --main-bg: #0f0c29;
            --accent-gold: #c5a059;
            --bright-gold: #ffd700;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --neon-shadow: 0 0 20px rgba(197, 160, 89, 0.4);
        }

        body {
            margin: 0;
            font-family: 'Tajawal', sans-serif;
            background: radial-gradient(circle at center, #24243e 0%, #0f0c29 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* شاشة البداية الاحترافية */
        #setup-screen {
            margin-top: 15vh;
            padding: 50px;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        input {
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--accent-gold);
            padding: 15px;
            border-radius: 12px;
            color: #fff;
            width: 280px;
            margin: 10px;
            text-align: center;
            font-size: 1.1rem;
            transition: 0.3s;
        }

        input:focus { outline: none; border-color: var(--bright-gold); box-shadow: var(--neon-shadow); }

        .btn-play {
            background: linear-gradient(45deg, var(--accent-gold), var(--bright-gold));
            color: #000;
            border: none;
            padding: 18px 60px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.3rem;
            cursor: pointer;
            margin-top: 30px;
            transition: 0.4s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-play:hover { transform: scale(1.05); box-shadow: 0 0 30px var(--bright-gold); }

        /* لوحة اللعبة */
        #game-board { display: none; width: 95%; max-width: 900px; padding: 20px; }
        
        .turn-box {
            font-size: 2rem;
            color: var(--bright-gold);
            margin-bottom: 30px;
            text-align: center;
            font-weight: 700;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 15px;
        }

        .cell {
            aspect-ratio: 1/1;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--accent-gold);
            cursor: pointer;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .cell::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,215,0,0.1) 0%, transparent 70%);
            transition: 0.5s;
        }

        .cell:hover {
            transform: translateY(-10px) scale(1.05);
            background: rgba(255,255,255,0.1);
            border-color: var(--bright-gold);
            box-shadow: var(--neon-shadow);
        }

        .cell.used { opacity: 0.1; transform: scale(0.9); pointer-events: none; }

        /* نافذة التحدي المنبثقة */
        #popup-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            display: none; justify-content: center; align-items: center; z-index: 10000;
        }

        .popup-card {
            background: linear-gradient(135deg, #fff 0%, #f0f0f0 100%);
            color: #1a1a2e;
            width: 90%;
            max-width: 550px;
            padding: 50px;
            border-radius: 40px;
            text-align: center;
            box-shadow: 0 0 100px rgba(197, 160, 89, 0.5);
            animation: zoomIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes zoomIn { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .challenge-text { font-size: 1.8rem; font-weight: 700; line-height: 1.6; margin-bottom: 30px; }

        .timer-wrapper {
            position: relative; width: 100px; height: 100px; margin: 0 auto;
            display: flex; justify-content: center; align-items: center;
        }

        #timer-num { font-size: 2.5rem; font-weight: bold; color: #e91e63; }

        .btn-done {
            background: #1a1a2e; color: #fff; border: none; padding: 15px 40px;
            border-radius: 30px; font-size: 1.1rem; cursor: pointer; margin-top: 20px;
            font-family: 'Tajawal'; transition: 0.3s;
        }
        
        .btn-done:hover { background: #e91e63; transform: translateY(-3px); }

        @media (max-width: 700px) {
            .grid { grid-template-columns: repeat(4, 1fr); }
            .challenge-text { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

    <div id="setup-screen">
        <h1 style="color: var(--bright-gold); font-size: 2.5rem; margin-bottom: 10px;">لعبة الألغاز الزوجية</h1>
        <p style="opacity: 0.7; margin-bottom: 30px;">استعدا لتجربة مليئة بالمرح والحميمية</p>
        <input type="text" id="p1" placeholder="اسم الزوج">
        <br>
        <input type="text" id="p2" placeholder="اسم الزوجة">
        <br>
        <button class="btn-play" onclick="start()">ابدأ الآن</button>
    </div>

    <div id="game-board">
        <div class="turn-box" id="turn-display"></div>
        <div class="grid" id="grid"></div>
    </div>

    <div id="popup-overlay">
        <div class="popup-card">
            <div class="challenge-text" id="popup-text"></div>
            <div class="timer-wrapper" id="timer-box">
                <span id="timer-num">15</span>
            </div>
            <button class="btn-done" id="done-btn" onclick="hidePopup()">تم التنفيذ ✓</button>
        </div>
    </div>

    <script>
        const tasks = [
            { t: "تجميد لمدة 15 ثانية: ابقَ في مكانك ودع شريكك يفعل ما يحلو له بك", time: true },
            { t: "تجميد لمدة 15 ثانية: ابقَ في مكانك ودع شريكك يفعل ما يحلو له بك", time: true },
            { t: "تجميد لمدة 15 ثانية: ابقَ في مكانك ودع شريكك يفعل ما يحلو له بك", time: true },
            { t: "تجميد لمدة 15 ثانية: ابقَ في مكانك ودع شريكك يفعل ما يحلو له بك", time: true },
            { t: "تجميد لمدة 15 ثانية: ابقَ في مكانك ودع شريكك يفعل ما يحلو له بك", time: true },
            { t: "اشترِ لي شيئاً باللون الأحمر بعد نهاية اللعبة", time: false },
            { t: "اشترِ لي شيئاً باللون الأزرق بعد نهاية اللعبة", time: false },
            { t: "اشترِ لي شيئاً باللون الأبيض بعد نهاية اللعبة", time: false },
            { t: "اشترِ لي شيئاً باللون الأخضر بعد نهاية اللعبة", time: false },
            { t: "أخبرني بسرك الكبير جداً", time: false },
            { t: "قبلة لمدة 15 ثانية", time: true },
            { t: "قبلة على الرقبة لمدة 15 ثانية", time: true },
            { t: "عانقني لمدة 15 ثانية", time: true },
            { t: "قبلة على الفخذ لمدة 15 ثانية", time: true },
            { t: "أخبرني نكتة مضحكة", time: false },
            { t: "قبلة في الأسفل", time: false },
            { t: "قبلة بين العينين", time: false },
            { t: "ما هو أكثر شيء تحبه في جسدي؟", time: false },
            { t: "قبلة على صدري", time: false },
            { t: "قبلة رقيقة ومطولة لمدة 15 ثانية", time: true },
            { t: "أخبرني ماذا يجب أن أنشر في منشوري القادم؟", time: false },
            { t: "لو أصبح الحلال حراماً ليوم واحد، ماذا ستفعل؟", time: false },
            { t: "قبلني الآن", time: false },
            { t: "عانقني بقوة", time: false },
            { t: "دعني أشرب الماء من فمك", time: false },
            { t: "ضع ماءً في فمك وسأحاول إضحاكك غصباً عنك", time: false },
            { t: "قبلة من اختيارك", time: false },
            { t: "عانقني من الخلف", time: false },
            { t: "تدليك لي لمدة 15 ثانية", time: true },
            { t: "دغدغني لمدة 15 ثانية", time: true }
        ];

        let players = [], current = 0, clock;

        function start() {
            const n1 = document.getElementById('p1').value, n2 = document.getElementById('p2').value;
            if(!n1 || !n2) return alert("أدخل الأسماء أولاً!");
            players = [n1, n2];
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('game-board').style.display = 'block';
            updateTurn();
            buildGrid();
        }

        function updateTurn() { document.getElementById('turn-display').innerText = `دور: ${players[current]}`; }

        function buildGrid() {
            const g = document.getElementById('grid');
            tasks.sort(() => Math.random() - 0.5).forEach((task, i) => {
                const c = document.createElement('div');
                c.className = 'cell';
                c.innerText = i + 1;
                c.style.animation = `fadeIn 0.5s ease forwards ${i * 0.05}s`;
                c.onclick = () => showChallenge(c, task);
                g.appendChild(c);
            });
        }

        function showChallenge(el, task) {
            el.classList.add('used');
            const over = document.getElementById('popup-overlay'), 
                  txt = document.getElementById('popup-text'),
                  tBox = document.getElementById('timer-box'),
                  btn = document.getElementById('done-btn');

            txt.innerText = task.t;
            over.style.display = 'flex';

            if(task.time) {
                tBox.style.display = 'flex'; btn.style.display = 'none';
                let s = 15; document.getElementById('timer-num').innerText = s;
                clearInterval(clock);
                clock = setInterval(() => {
                    s--; document.getElementById('timer-num').innerText = s;
                    if(s <= 0) { clearInterval(clock); setTimeout(hidePopup, 800); }
                }, 1000);
            } else {
                tBox.style.display = 'none'; btn.style.display = 'block';
            }
        }

        function hidePopup() {
            document.getElementById('popup-overlay').style.display = 'none';
            current = current === 0 ? 1 : 0;
            updateTurn();
        }
    </script>
</body>
</html>
